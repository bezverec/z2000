name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Version tag to validate, for example v0.1.0-rc.2
        required: true
        default: v0.1.0-rc.2
        type: string
      ref:
        description: Branch, tag, or commit to build when publish is false
        required: true
        default: main
        type: string
      publish:
        description: Publish a GitHub Release (requires an existing exact tag)
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      build_number: ${{ steps.meta.outputs.build_number }}
      git_sha: ${{ steps.meta.outputs.git_sha }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
      expected_version: ${{ steps.meta.outputs.expected_version }}
    steps:
      - name: Check out requested revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.publish && inputs.tag || inputs.ref }}
          fetch-depth: 0

      - name: Validate release metadata
        id: meta
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          PUBLISH: ${{ inputs.publish }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_TAG" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)(-([0-9A-Za-z.-]+))?$ ]]; then
            echo "invalid release tag: $RELEASE_TAG" >&2
            exit 1
          fi
          base_version="${BASH_REMATCH[1]}"
          prerelease="${BASH_REMATCH[3]:-}"
          if [[ -n "$prerelease" && ! "$prerelease" =~ ^rc\.[1-9][0-9]*$ ]]; then
            echo "only rc.N prerelease tags are accepted" >&2
            exit 1
          fi
          if [[ "$(tr -d '[:space:]' < VERSION)" != "$base_version" ]]; then
            echo "VERSION does not match $RELEASE_TAG" >&2
            exit 1
          fi
          if [[ ! -f "docs/releases/${RELEASE_TAG}.md" ]]; then
            echo "missing docs/releases/${RELEASE_TAG}.md" >&2
            exit 1
          fi
          if [[ "$PUBLISH" == "true" ]]; then
            git show-ref --verify --quiet "refs/tags/${RELEASE_TAG}" || {
              echo "publish requires an existing tag" >&2
              exit 1
            }
            tag_commit="$(git rev-list -n 1 "$RELEASE_TAG")"
            head_commit="$(git rev-parse HEAD)"
            if [[ "$tag_commit" != "$head_commit" ]]; then
              echo "tag does not point to the tested checkout" >&2
              exit 1
            fi
          fi
          build_number="$(git rev-list --count HEAD)"
          git_sha="$(git rev-parse --short=8 HEAD)"
          version="${RELEASE_TAG#v}+build.${build_number}.g${git_sha}"
          echo "build_number=$build_number" >> "$GITHUB_OUTPUT"
          echo "git_sha=$git_sha" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$([[ -n "$prerelease" ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "expected_version=z2000 $version" >> "$GITHUB_OUTPUT"

  build:
    needs: metadata
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            target: x86_64-linux-musl
            emulated: false
            zig_url: https://ziglang.org/download/0.16.0/zig-x86_64-linux-0.16.0.tar.xz
            zig_sha: 70e49664a74374b48b51e6f3fdfbf437f6395d42509050588bd49abe52ba3d00
            zig_dir: zig-x86_64-linux-0.16.0
            executable: z2000
            alias: z2k
          - os: windows-latest
            platform: windows-x86_64
            target: native
            emulated: false
            zig_url: https://ziglang.org/download/0.16.0/zig-x86_64-windows-0.16.0.zip
            zig_sha: 68659eb5f1e4eb1437a722f1dd889c5a322c9954607f5edcf337bc3684a75a7e
            zig_dir: zig-x86_64-windows-0.16.0
            executable: z2000.exe
            alias: z2k.exe
          - os: macos-15
            platform: macos-aarch64
            target: native
            emulated: false
            zig_url: https://ziglang.org/download/0.16.0/zig-aarch64-macos-0.16.0.tar.xz
            zig_sha: b23d70deaa879b5c2d486ed3316f7eaa53e84acf6fc9cc747de152450d401489
            zig_dir: zig-aarch64-macos-0.16.0
            executable: z2000
            alias: z2k
          - os: ubuntu-latest
            platform: linux-riscv64
            target: riscv64-linux-musl
            emulated: true
            zig_url: https://ziglang.org/download/0.16.0/zig-x86_64-linux-0.16.0.tar.xz
            zig_sha: 70e49664a74374b48b51e6f3fdfbf437f6395d42509050588bd49abe52ba3d00
            zig_dir: zig-x86_64-linux-0.16.0
            executable: z2000
            alias: z2k
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out requested revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.publish && inputs.tag || inputs.ref }}
          fetch-depth: 0

      - name: Install Zig 0.16.0 (Linux)
        if: runner.os == 'Linux'
        env:
          ZIG_URL: ${{ matrix.zig_url }}
          ZIG_SHA: ${{ matrix.zig_sha }}
          ZIG_DIR: ${{ matrix.zig_dir }}
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location "$ZIG_URL" --output zig.tar.xz
          echo "$ZIG_SHA  zig.tar.xz" | sha256sum --check -
          tar -xf zig.tar.xz
          echo "$PWD/$ZIG_DIR" >> "$GITHUB_PATH"

      - name: Install Zig 0.16.0 (macOS)
        if: runner.os == 'macOS'
        env:
          ZIG_URL: ${{ matrix.zig_url }}
          ZIG_SHA: ${{ matrix.zig_sha }}
          ZIG_DIR: ${{ matrix.zig_dir }}
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location "$ZIG_URL" --output zig.tar.xz
          echo "$ZIG_SHA  zig.tar.xz" | shasum -a 256 --check
          tar -xf zig.tar.xz
          echo "$PWD/$ZIG_DIR" >> "$GITHUB_PATH"

      - name: Install Zig 0.16.0 (Windows)
        if: runner.os == 'Windows'
        env:
          ZIG_URL: ${{ matrix.zig_url }}
          ZIG_SHA: ${{ matrix.zig_sha }}
          ZIG_DIR: ${{ matrix.zig_dir }}
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri $env:ZIG_URL -OutFile zig.zip
          $actual = (Get-FileHash zig.zip -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actual -ne $env:ZIG_SHA) { throw "Zig archive checksum mismatch" }
          Expand-Archive zig.zip -DestinationPath .
          (Resolve-Path $env:ZIG_DIR).Path | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install RISC-V user-mode emulator
        if: matrix.emulated
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends qemu-user

      - name: Run native Debug tests
        if: ${{ !matrix.emulated }}
        run: zig build test -Dtarget=native

      - name: Run native ReleaseFast tests
        if: ${{ !matrix.emulated }}
        run: zig build test -Dtarget=native -Doptimize=ReleaseFast

      - name: Run RISC-V tests under QEMU
        if: matrix.emulated
        env:
          TARGET: ${{ matrix.target }}
        shell: bash
        run: zig build test "-Dtarget=$TARGET" -Doptimize=ReleaseFast -fqemu

      - name: Build release binary (Unix)
        if: runner.os != 'Windows'
        env:
          PRERELEASE: ${{ needs.metadata.outputs.prerelease }}
          BUILD_NUMBER: ${{ needs.metadata.outputs.build_number }}
          GIT_SHA: ${{ needs.metadata.outputs.git_sha }}
          TARGET: ${{ matrix.target }}
        shell: bash
        run: |
          set -euo pipefail
          args=(
            -Drelease=true
            -Doptimize=ReleaseFast
            "-Dtarget=$TARGET"
            "-Dbuild-number=$BUILD_NUMBER"
            "-Dgit-sha=$GIT_SHA"
            -Dgit-dirty=false
          )
          if [[ -n "$PRERELEASE" ]]; then args+=("-Dprerelease=$PRERELEASE"); fi
          zig build "${args[@]}"

      - name: Build release binary (Windows)
        if: runner.os == 'Windows'
        env:
          PRERELEASE: ${{ needs.metadata.outputs.prerelease }}
          BUILD_NUMBER: ${{ needs.metadata.outputs.build_number }}
          GIT_SHA: ${{ needs.metadata.outputs.git_sha }}
        shell: pwsh
        run: |
          $args = @(
            "-Drelease=true",
            "-Doptimize=ReleaseFast",
            "-Dtarget=native",
            "-Dbuild-number=$env:BUILD_NUMBER",
            "-Dgit-sha=$env:GIT_SHA",
            "-Dgit-dirty=false"
          )
          if ($env:PRERELEASE) { $args += "-Dprerelease=$env:PRERELEASE" }
          & zig build @args
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Verify embedded version (Unix)
        if: runner.os != 'Windows' && !matrix.emulated
        env:
          EXPECTED_VERSION: ${{ needs.metadata.outputs.expected_version }}
        shell: bash
        run: |
          set -euo pipefail
          actual="$(./zig-out/bin/z2000 --version 2>&1)"
          test "$actual" = "$EXPECTED_VERSION"
          alias_actual="$(./zig-out/bin/z2k --version 2>&1)"
          test "$alias_actual" = "$EXPECTED_VERSION"

      - name: Verify embedded version (RISC-V)
        if: matrix.emulated
        env:
          EXPECTED_VERSION: ${{ needs.metadata.outputs.expected_version }}
        shell: bash
        run: |
          set -euo pipefail
          actual="$(qemu-riscv64 ./zig-out/bin/z2000 --version 2>&1)"
          test "$actual" = "$EXPECTED_VERSION"
          alias_actual="$(qemu-riscv64 ./zig-out/bin/z2k --version 2>&1)"
          test "$alias_actual" = "$EXPECTED_VERSION"

      - name: Verify embedded version (Windows)
        if: runner.os == 'Windows'
        env:
          EXPECTED_VERSION: ${{ needs.metadata.outputs.expected_version }}
        shell: pwsh
        run: |
          $actual = (& .\zig-out\bin\z2000.exe --version 2>&1 | Out-String).Trim()
          if ($actual -ne $env:EXPECTED_VERSION) {
            throw "expected '$env:EXPECTED_VERSION', got '$actual'"
          }
          $aliasActual = (& .\zig-out\bin\z2k.exe --version 2>&1 | Out-String).Trim()
          if ($aliasActual -ne $env:EXPECTED_VERSION) {
            throw "expected z2k alias '$env:EXPECTED_VERSION', got '$aliasActual'"
          }

      - name: Package release archive (Unix)
        if: runner.os != 'Windows'
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          PLATFORM: ${{ matrix.platform }}
          EXECUTABLE: ${{ matrix.executable }}
          ALIAS: ${{ matrix.alias }}
        shell: bash
        run: |
          set -euo pipefail
          package="z2000-${RELEASE_TAG}-${PLATFORM}"
          mkdir -p "dist/$package"
          install -m 755 "zig-out/bin/$EXECUTABLE" "dist/$package/$EXECUTABLE"
          install -m 755 "zig-out/bin/$ALIAS" "dist/$package/$ALIAS"
          cp README.md LICENSE VERSION "dist/$package/"
          cp "docs/releases/${RELEASE_TAG}.md" "dist/$package/RELEASE_NOTES.md"
          tar -czf "dist/${package}.tar.gz" -C dist "$package"

      - name: Package release archive (Windows)
        if: runner.os == 'Windows'
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          PLATFORM: ${{ matrix.platform }}
          EXECUTABLE: ${{ matrix.executable }}
          ALIAS: ${{ matrix.alias }}
        shell: pwsh
        run: |
          $package = "z2000-$env:RELEASE_TAG-$env:PLATFORM"
          $packageDir = Join-Path dist $package
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          Copy-Item "zig-out\bin\$env:EXECUTABLE" $packageDir
          Copy-Item "zig-out\bin\$env:ALIAS" $packageDir
          Copy-Item README.md, LICENSE, VERSION $packageDir
          Copy-Item "docs\releases\$env:RELEASE_TAG.md" (Join-Path $packageDir RELEASE_NOTES.md)
          Compress-Archive -Path $packageDir -DestinationPath "dist\$package.zip"

      - name: Upload platform archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ matrix.platform }}
          path: dist/z2000-${{ inputs.tag }}-${{ matrix.platform }}.*
          if-no-files-found: error
          compression-level: 0

  assemble:
    needs: [metadata, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out release metadata
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.publish && inputs.tag || inputs.ref }}
          fetch-depth: 0

      - name: Download platform archives
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum z2000-* > SHA256SUMS

      - name: Upload complete dry-run bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: z2000-${{ inputs.tag }}-release-bundle
          path: dist/*
          if-no-files-found: error
          compression-level: 0

      - name: Publish GitHub Release
        if: inputs.publish
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
          IS_PRERELEASE: ${{ needs.metadata.outputs.is_prerelease }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "release already exists: $RELEASE_TAG" >&2
            exit 1
          fi
          flags=()
          if [[ "$IS_PRERELEASE" == "true" ]]; then flags+=(--prerelease); fi
          gh release create "$RELEASE_TAG" dist/* \
            --verify-tag \
            --title "z2000 ${RELEASE_TAG#v}" \
            --notes-file "docs/releases/${RELEASE_TAG}.md" \
            "${flags[@]}"
